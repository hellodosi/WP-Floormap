title: WP Floormap
description: Interaktive Gebäudekarte als WordPress-Plugin.
remote_theme: just-the-docs/just-the-docs
logo: "/assets/images/logo.png"

# Site settings
url: "https://floormap.dosimo.de" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "" # the subpath of your site, e.g. /blog
permalink: pretty

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache

# Just the Docs Settings
search_enabled: true
search:
  tokenizer_separator: /[\s/]+/
  # Display the results as a list of links (the default) or as a single large link
  rel_url: true

footer_content: "Copyright &copy; 2026 WP Floormap"

nav_footer: |
  <!-- Google Translate Widget -->
  <div id="google_translate_element"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'de',
        includedLanguages: 'en,es,fr,nl',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

# GitHub Repository Link
aux_links:
  "GitHub Repository":
    - https://github.com/hellodosi/WP-Floormap

# Layout settings
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude files from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .idea
  - .junie
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata