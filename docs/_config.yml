title: WP Floormap
description: Interaktive Gebäudekarte als WordPress-Plugin.
remote_theme: tomjoht/documentation-theme-jekyll

# Site settings
url: "https://floormap.dosimo.de" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "" # the subpath of your site, e.g. /blog
permalink: pretty

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache

# Navigation (für das Theme spezifisch)
nav:
  - title: Home
    url: /
  - title: Installation
    url: /installation/
  - title: Verwendung
    url: /usage/
  - title: Technische Details
    url: /technical-details/

# GitHub Repository Link
github_url: https://github.com/hellodosi/WP-Floormap

# Layout settings
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude files from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .idea
  - .junie
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata