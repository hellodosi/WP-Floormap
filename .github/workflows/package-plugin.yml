name: Package WordPress Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "Version:" wp-floormap.php | awk '{print $NF}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if version changed
        id: check_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"
          echo "Current version: ${{ steps.get_version.outputs.VERSION }}"
          
          if [ "${{ steps.get_version.outputs.VERSION }}" != "$LATEST_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP artifact
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # ZIP-Dateiname festlegen
          ZIP_NAME="wp-floormap.zip"
          
          # Ordnername im ZIP (Plugin-Slug)
          PLUGIN_SLUG="wp-floormap"
          
          # Temporäres Verzeichnis für den Build erstellen
          mkdir -p $PLUGIN_SLUG
          
          # Alle Dateien außer den ausgeschlossenen kopieren
          # Ausschluss gemäß Guidelines: my-assets und todo.md
          # Sowie .git, .github und andere Entwicklungs-Dateien
          rsync -av . $PLUGIN_SLUG \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "my-assets" \
            --exclude "todo.md" \
            --exclude "docs" \
            --exclude ".idea" \
            --exclude "*.zip" \
            --exclude ".gitignore"

          # ZIP erstellen
          zip -r $ZIP_NAME $PLUGIN_SLUG
          
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release and Tag
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: wp-floormap.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: wp-floormap-plugin-v${{ steps.get_version.outputs.VERSION }}
          path: wp-floormap.zip
